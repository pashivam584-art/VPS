name: 24/7 SSH Runner (sshx)

on:
  push:
    branches: [ "main" ]
  # Har 4 ghante me apne aap restart hoga (240 mins limit ke liye)
  schedule:
    - cron: '0 */4 * * *' 
  # Manual start karne ka button
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # GitHub Actions ki max limit 240 minutes (4 hours) hoti hai
    timeout-minutes: 240 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start SSH and Keep Alive
        run: |
          echo "Installing sshx..."
          
          # 1. sshx server ko background mein start karein
          curl -sSf https://sshx.io/get | sh -s run &
          
          # 15 seconds wait karein taaki link generate ho jaye
          sleep 15
          
          echo ""
          echo "--------------------------------------------------------"
          echo " TERMINAL LINK DHUNDHEIN: "
          echo " Neeche logs mein 'https://sshx.io/s/XXXXXXXX' jaisa link hoga."
          echo " Use click karke apna terminal open karein."
          echo "--------------------------------------------------------"
          echo ""

          # 2. Keep Alive Loop
          # Isse runner 235 minutes tak chalta rahega (Band nahi hoga)
          end=$((SECONDS + 235 * 60))
          
          while [ $SECONDS -lt $end ]; do
            echo "Status: Runner Active | Time: $(date)"
            # Logs update karne ke liye har 5 minute mein print karega
            sleep 300 
          done
          
          echo "Time khatam ho raha hai. Agla scheduled job jald shuru hoga."
